<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/chatStyle.css" rel="stylesheet">
    <title>Meu Chat</title>
</head>
<body>

    <section class="container-principal">

        <section class="painel-de-informacoes">

            <div class="titulo-painel">
                <p>Painel de Informações</p>
            </div>

            <div class="conteudo-do-painel">
                <div class="metrica">
                    <img class="logo-painel" src="../imagens/icones/operador-de-telemarketing-masculino.png">
                    <p>Atendentes Online: <span id="numero-atendentes"></span></p>
                </div>

                <div class="metrica">
                    <img class="logo-painel" src="../imagens/icones/ampulheta.png">
                    <p>Clientes Aguardando: <span id="numero-clientes-espera"></span></p>
                </div>

                <div class="metrica">
                    <img class="logo-painel" src="../imagens/icones/telefone.png">
                    <p>Atendimentos em andamento: <span id="numero-atendimentos-andamento"></span></p>
                </div>

                <div class="metrica">
                    <img class="logo-painel" src="../imagens/icones/relogio.png">
                    <p>Tempo Médio de Espera: <span id="numero-tempo-espera"></span></p>
                </div>

                <hr>

                <div class="painel-segunda-secao">
                    <p>STATUS DO ATENDENTE</p>

                    <div class="informacoes-atendente">
                        <div>
                            <img class="imagem-atendente" src="../imagens/icones/telemarketer-headset-svgrepo-com.png">
                            <div>
                                <p class="nome-atendente-online"> Atendente Carol</p>
                                <p class="status">Online</p>
                            </div>
                            <div class="circulo"></div>
                        </div>

                        <p><span class="nome-atendente-online"></span> está falando com <span class="nome-cliente"></span></p>
                    </div>
                    <p>Outros Atendentes</p>
                    <span class="atendentes-logados"></span>
                </div>
            </div>

        </section>
        <section class="container-chat-completo">

            <div class="container">
                <img class="imagem-atendente" src="../imagens/icones/telemarketer-headset-svgrepo-com.png">
                <div class="cabecalho-chat">
                    <p class="titulo-chat">Chat de Atendimento</p>
                    <p class="nome-atendente">
                    </p>
                </div>
                <br>
                <div class="caixa-msg-conversa">
                    <div>
                        <span class="historico-chat">Histórico de Chat</span>
                    </div>
                    <p class="msg-aviso">     
                    </p>
                    <ul id="chat">
                    </ul>
                </div>
            </div>

            <form class="formulario-envio" onsubmit="return false;">
                <h3>Nova Mensagem</h3>
                <br>
                <div class="bloco-de-envio">
                    <label for="nome">Nome Completo</label>
                    <br>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                </div>
                <div class="bloco-de-envio">
                    <label for="msg">Mensagem</label>
                    <br>
                    <textarea type="text" id="msg" name="msg" placeholder="Digite a mensagem"></textarea>
                </div>
                <button id="btn-enviar">Enviar Mensagem</button>
                <br>
            </form>
            
        </section>

    </section>

    <script type="module" src="../js/controllers/chatController.js"></script>
    
</body>
</html>
